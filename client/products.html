<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sản Phẩm - Quản Lý Nội Bộ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { api, formatCurrency, layoutTemplate, showToast, showConfirm, requireAuth } from "/assets/app.js";

    let products = [];

    async function loadProducts() {
      try {
        products = await api("/products");
        renderProductList();
      } catch (error) {
        console.error("Lỗi tải sản phẩm:", error);
        showToast("Lỗi: " + error.message, "error");
      }
    }

    function renderProductList() {
      const tbody = document.getElementById("productBody");
      
      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-6 text-gray-400">Chưa có sản phẩm</td></tr>';
        return;
      }

      tbody.innerHTML = products.map((product, idx) => `
        <tr class="border-b border-gray-700 hover:bg-[#1f1f2e] transition">
          <td class="py-3 px-4">${idx + 1}</td>
          <td class="py-3 px-4">${product.name}</td>
          <td class="py-3 px-4 text-sm text-gray-300">${product.description || "-"}</td>
          <td class="py-3 px-4 text-sm">${new Date(product.createdAt).toLocaleDateString("vi-VN")}</td>
          <td class="py-3 px-4 text-center space-x-2">
            <button onclick="openEditModal(\`${product._id}\`, \`${product.name.replace(/`/g, "\\`")}\`, \`${(product.description || "").replace(/`/g, "\\`")}\`)" class="px-3 py-1 bg-yellow-600 hover:bg-yellow-700 rounded text-sm transition">Sửa</button>
            <button onclick="deleteProduct(\`${product._id}\`)" class="px-3 py-1 bg-red-600 hover:bg-red-700 rounded text-sm transition">Xóa</button>
          </td>
        </tr>
      `).join("");
    }

    window.openEditModal = function(id, name, description) {
      document.getElementById("editProductId").value = id;
      document.getElementById("editProductName").value = name;
      document.getElementById("editProductDescription").value = description;
      document.getElementById("editModal").classList.remove("hidden");
    };

    window.closeEditModal = function() {
      document.getElementById("editModal").classList.add("hidden");
    };

    window.deleteProduct = async function(id) {
      const confirmed = await showConfirm("Xóa sản phẩm", "Bạn chắc chắn muốn xóa sản phẩm này?");
      if (!confirmed) return;

      try {
        await api(`/products/${id}`, { method: "DELETE" });
        loadProducts();
        showToast("Xóa sản phẩm thành công", "success");
      } catch (error) {
        showToast("Lỗi: " + error.message, "error");
      }
    };

    const app = document.getElementById("app");

    const content = `
      <div class="gradient-header rounded-2xl p-6">
        <h2 class="text-4xl font-bold">Sản Phẩm</h2>
        <p class="mt-2 text-indigo-100">CRUD danh sách sản phẩm</p>
      </div>

      <div class="panel p-5 mt-5">
        <h3 class="text-xl font-bold mb-4">Thêm Sản Phẩm</h3>
        <form id="addProductForm" class="space-y-4">
          <div>
            <label class="mb-2 block text-sm text-slate-300">Tên sản phẩm</label>
            <input
              type="text"
              id="productName"
              placeholder="Nhập tên sản phẩm"
              class="input-base"
              required
            />
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-300">Mô tả</label>
            <textarea
              id="productDescription"
              placeholder="Nhập mô tả (tùy chọn)"
              rows="3"
              class="input-base"
            ></textarea>
          </div>
          <button type="submit" class="btn-highlight w-full">+ Thêm Sản Phẩm</button>
        </form>
      </div>

      <div class="panel p-5 mt-5">
        <h3 class="text-xl font-bold mb-4">Danh Sách Sản Phẩm</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="py-2 text-left">#</th>
                <th class="py-2 text-left">Tên Sản Phẩm</th>
                <th class="py-2 text-left">Mô Tả</th>
                <th class="py-2 text-left">Ngày Tạo</th>
                <th class="py-2 text-center">Hành Động</th>
              </tr>
            </thead>
            <tbody id="productBody">
              <tr>
                <td colspan="5" class="text-center py-6 text-gray-400">Chưa có sản phẩm</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-[#181824] rounded-lg p-6 w-96 shadow-lg border border-blue-500">
          <h2 class="text-xl font-bold mb-4">Sửa Sản Phẩm</h2>
          <form id="editForm" class="space-y-4">
            <input type="hidden" id="editProductId" />
            <div>
              <label class="mb-2 block text-sm text-slate-300">Tên sản phẩm</label>
              <input type="text" id="editProductName" class="input-base" required />
            </div>
            <div>
              <label class="mb-2 block text-sm text-slate-300">Mô tả</label>
              <textarea id="editProductDescription" rows="3" class="input-base"></textarea>
            </div>
            <div class="flex gap-3">
              <button type="submit" class="btn-primary flex-1">Cập Nhật</button>
              <button type="button" class="btn-secondary flex-1" onclick="closeEditModal()">Hủy</button>
            </div>
          </form>
        </div>
      </div>
    `;

    app.innerHTML = layoutTemplate(content, "products");

    // Add Product
    document.getElementById("addProductForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("productName").value.trim();
      const description = document.getElementById("productDescription").value.trim();

      if (!name) {
        showToast("Vui lòng nhập tên sản phẩm", "error");
        return;
      }

      try {
        await api("/products", {
          method: "POST",
          body: JSON.stringify({ name, description }),
          headers: { "Content-Type": "application/json" }
        });
        document.getElementById("addProductForm").reset();
        loadProducts();
        showToast("Thêm sản phẩm thành công", "success");
      } catch (error) {
        showToast("Lỗi: " + error.message, "error");
      }
    });

    // Update Product
    document.getElementById("editForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("editProductId").value;
      const name = document.getElementById("editProductName").value.trim();
      const description = document.getElementById("editProductDescription").value.trim();

      if (!name) {
        showToast("Vui lòng nhập tên sản phẩm", "error");
        return;
      }

      try {
        await api(`/products/${id}`, {
          method: "PUT",
          body: JSON.stringify({ name, description }),
          headers: { "Content-Type": "application/json" }
        });
        closeEditModal();
        loadProducts();
        showToast("Cập nhật sản phẩm thành công", "success");
      } catch (error) {
        showToast("Lỗi: " + error.message, "error");
      }
    });

    if (requireAuth("products")) {
      loadProducts();
    }
  </script>
</body>
</html>
